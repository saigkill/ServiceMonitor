trigger:
  branches:
    include:
      - develop
      - master
  tags:
    include:
      - v*

pool:
  vmImage: ubuntu-latest

variables:
  BuildConfiguration: Release
  AppName: ServiceMonitor
  # Fallback: Commit-Hash oder BuildId
  #version: $[coalesce(variables['Build.SourceVersion'], variables['Build.BuildId'])]
  version: $(PackageVersion)

stages:

# ---------------------------------------------------------
#  STAGE: BUILD (Linux + Windows)
# ---------------------------------------------------------
- stage: Build
  displayName: "Build Linux + Windows"
  jobs:

  # -------------------------
  # Linux Build
  # -------------------------
  - job: Build_Linux
    displayName: "Build Linux"
    pool:
      vmImage: ubuntu-latest

    variables:
      RID: linux-x64
      ArtifactName: '$(AppName)-Linux.zip'

    steps:
    - task: UseDotNet@2
      displayName: "Install .NET SDK"
      inputs:
        packageType: sdk
        version: 9.x

    - task: AdvancedSecurity-Codeql-Init@1
      displayName: "Initialize CodeQL"
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      inputs:
        languages: csharp
        querysuite: security-and-quality

    - task: Bash@3
      displayName: "Restore & Build"
      inputs:
        targetType: inline
        script: |
          set -e
          dotnet restore src/$(AppName).slnx
          dotnet build --configuration $(BuildConfiguration) src/$(AppName).slnx   

    - task: DotNetCoreCLI@2
      displayName: "Publish Console App (Linux)"
      inputs:
        command: publish
        publishWebProjects: false
        projects: '**/*.csproj'
        arguments: >
          --configuration $(BuildConfiguration)
          -r $(RID)
          --self-contained true
          --output $(Build.ArtifactStagingDirectory)/$(AppName)

    - task: DotNetCoreCLI@2
      displayName: "Run Unit Tests (Linux)"
      inputs:
        command: test
        projects: '**/*[Tt]est*/*.csproj'
        arguments: >
          --collect:"XPlat Code Coverage"
          --logger:junit
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
        testRunTitle: 'dotnet test (Linux)'

    - task: AdvancedSecurity-Codeql-Analyze@1
      displayName: "Perform CodeQL analysis"
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')

    - task: PublishTestResults@2
      displayName: "Publish Test Results (Linux)"
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: '**/TestResults/TestResults.xml'
        testRunTitle: 'Run Testresults (Linux)'

    - task: PublishCodeCoverageResults@2
      displayName: "Publish Code Coverage Results (Linux)"
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/**/coverage.cobertura.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)/**/coverage'

    - task: reportgenerator@5
      displayName: "Generate Code Coverage Report (Linux)"
      inputs:
        reports: '$(Build.SourcesDirectory)/**/coverage.cobertura.xml'
        targetdir: '$(Build.SourcesDirectory)/CodeCoverage'

    - task: AdvancedSecurity-Publish@1
      displayName: "Publish CodeQL results"
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')

    - task: Bash@3
      displayName: "Mirror to GitHub"
      inputs:
        targetType: inline
        script: |
          set -e

          if [ -d "$(AppName)" ]; then
            rm -rf "$(AppName)"
            echo "Das Verzeichnis '$(AppName)' wurde gelöscht."
          else
            echo "Das Verzeichnis '$(AppName)' existiert nicht."
          fi

          git clone --mirror "https://saigkill:$(AzurePAT)@dev.azure.com/saigkill/$(AppName)/_git/$(AppName)" "./$(AppName)" --verbose
          cd "$(AppName)"
          git remote add github "https://saigkill:$(GithubPAT)@github.com/saigkill/$(AppName).git"
          git push github --mirror

    - task: ArchiveFiles@2
      displayName: "Create ZIP (Linux)"
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/$(AppName)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(ArtifactName)'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)'
      displayName: "Publish Artifact (Linux)"
      artifact: linux-x64

  # -------------------------
  # Windows Build
  # -------------------------
  - job: Build_Windows
    displayName: "Build Windows"
    pool:
      vmImage: windows-latest

    variables:
      RID: win-x64
      ArtifactName: '$(AppName)-Windows.zip'

    steps:
    - task: UseDotNet@2
      displayName: "Install .NET SDK"
      inputs:
        packageType: sdk
        version: 9.x

    - task: PowerShell@2
      displayName: "Restore & Build"
      inputs:
        targetType: inline
        script: |
          dotnet restore src/$(AppName).slnx
          dotnet build --configuration $(BuildConfiguration) src/$(AppName).slnx

    - task: DotNetCoreCLI@2
      displayName: "Publish Console App (Windows)"
      inputs:
        command: publish
        publishWebProjects: false
        projects: '**/*.csproj'
        arguments: >
          --configuration $(BuildConfiguration)
          -r $(RID)
          --self-contained true
          --output $(Build.ArtifactStagingDirectory)/$(AppName)

    - task: DotNetCoreCLI@2
      displayName: "Run Unit Tests (Windows)"
      inputs:
        command: test
        projects: '**/*[Tt]est*/*.csproj'
        arguments: >
          --collect:"XPlat Code Coverage"
          --logger:junit
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
        testRunTitle: 'dotnet test (Windows)'

    - task: PublishTestResults@2
      displayName: "Publish Test Results (Windows)"
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: '$(Agent.TempDirectory)/TestResults.xml'
        testRunTitle: 'Run Testresults (Windows)'

    - task: ArchiveFiles@2
      displayName: "Create ZIP (Windows)"
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/$(AppName)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(ArtifactName)'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)'
      displayName: "Publish Artifact (Windows)"
      artifact: win-x64

# ============================================================
# STAGE: PACKAGING (Linux only)
# ============================================================
- stage: Package
  displayName: "Package Stage"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: PackageLinux
    displayName: "Build DEB + RPM"
    pool:
      vmImage: ubuntu-latest

    variables:
      version: $[coalesce(variables['Build.SourceVersion'], variables['Build.BuildId'])]

    steps:
    - download: current
      displayName: "Download Linux artifact"
      artifact: linux-x64

    - script: |
        set -e
        mkdir -p publish/linux-x64
        unzip $(Pipeline.Workspace)/linux-x64/$(AppName)-Linux.zip -d publish/linux-x64
      displayName: "Unzip Linux Build"

    - script: |
        set -e
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev build-essential rpm
        sudo gem install --no-document fpm
      displayName: "Install FPM"

    - script: |
        mkdir -p systemd   
        cp packaging/systemd/servicemonitor.service systemd/
      displayName: "Copy systemd unit"


    - script: |
        mkdir -p deb-scripts
        cp packaging/deb/postinst deb-scripts/
        cp packaging/deb/postrm deb-scripts/
        chmod +x deb-scripts/postinst deb-scripts/postrm
      displayName: "Copy DEB scripts"


    - script: |
        mkdir -p rpm-scripts
        cp packaging/rpm/pre rpm-scripts/
        cp packaging/rpm/post rpm-scripts/
        chmod +x rpm-scripts/pre rpm-scripts/post
      displayName: "Copy RPM scripts"


    - script: |
        fpm -s dir -t deb \
        -n servicemonitor \
        -v $(version) \
        --after-install deb-scripts/postinst \
        --after-remove deb-scripts/postrm \
        --prefix /usr/local/bin \
        publish/linux-x64/=usr/local/bin/ \
        systemd/servicemonitor.service=/lib/systemd/system/servicemonitor.service
      displayName: "Build DEB package"


    - script: |
        fpm -s dir -t rpm \
        -n servicemonitor \
        -v $(version) \
        --before-install rpm-scripts/pre \
        --after-install rpm-scripts/post \
        --prefix /usr/local/bin \
        publish/linux-x64/=usr/local/bin/ \
        systemd/servicemonitor.service=/usr/lib/systemd/system/servicemonitor.service
      displayName: "Build RPM package"    


    - publish: "servicemonitor_$(version)_amd64.deb"
      displayName: "Publish DEB artifact"
      artifact: deb

    - publish: "servicemonitor-$(version)-1.x86_64.rpm"
      displayName: "Publish RPM artifact"
      artifact: rpm

# ---------------------------------------------------------
#  STAGE: RELEASE (nur bei Tags)
# ---------------------------------------------------------
- stage: Release
  displayName: "Create GitHub Release"
  dependsOn:
    - Build
    - Package
  condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
  jobs:
  - job: ReleaseJob
    displayName: "Create GitHub Release"
    pool:
      vmImage: ubuntu-latest
    steps:
    - download: current
      displayName: "Download Linux ZIP"
      artifact: linux-x64

    - download: current
      displayName: "Download Windows ZIP"
      artifact: win-x64

    - download: current
      displayName: "Download DEB"
      artifact: deb

    - download: current
      displayName: "Download RPM"
      artifact: rpm    

    - task: GitHubRelease@1
      displayName: "Create GitHub Release"
      inputs:
        gitHubConnection: github.com_saigkill
        repositoryName: "saigkill/$(AppName)"
        action: create
        tagSource: gitTag
        assets: |
          $(Pipeline.Workspace)/linux-x64/*.zip
          $(Pipeline.Workspace)/win-x64/*.zip
          $(Pipeline.Workspace)/deb/*.deb
          $(Pipeline.Workspace)/rpm/*.rpm       
        title: "Release $(Build.SourceBranchName)"
        isDraft: false
        isPreRelease: false
