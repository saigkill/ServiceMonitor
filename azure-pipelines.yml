trigger:
  branches:
    include:
      - develop
      - master
  tags:
    include:
      - v*

pool:
  vmImage: 'ubuntu-latest'  

variables:
  BuildConfiguration: 'Release'
  version: $[coalesce(variables['Build.SourceVersion'], variables['Build.BuildId'])]
  AppName: 'ServiceMonitor'

stages:

# ---------------------------------------------------------
#  STAGE: BUILD (Linux + Windows parallel)
# ---------------------------------------------------------
- stage: Build
  displayName: "Build Linux + Windows"
  jobs:
  - job: MatrixBuild
    displayName: "Matrix Build"
    strategy:
      matrix:
        linux:
          vmImage: 'ubuntu-latest'
          RID: 'linux-x64'
          ArtifactName: '$(AppName)-Linux-$(version).zip'
        windows:
          vmImage: 'windows-latest'
          RID: 'win-x64'
          ArtifactName: '$(AppName)-Windows-$(version).zip'

    pool:
      vmImage: $(vmImage)

    variables:
      version: $[coalesce(variables['Build.SourceVersion'], variables['Build.BuildId'])]
      AppName: 'ServiceMonitor'

    steps:

    # DotNet SDK
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '9.x'

    # Restore & Build
    - task: Bash@3
      inputs:
        targetType: 'inline'
        script: |             
          dotnet restore
          dotnet build --configuration $(buildConfiguration)
      displayName: "Restore & Build"      

    # CodeQL nur in develop
    - task: AdvancedSecurity-Codeql-Init@1
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      inputs:
        languages: 'csharp'
        querysuite: 'security-and-quality'
      displayName: 'Initialize CodeQL'

    # Publish
    - task: DotNetCoreCLI@2
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/*.csproj'
        arguments: '--configuration $(BuildConfiguration) -r $(RID) --self-contained true --output $(Build.ArtifactStagingDirectory)/$(AppName)'
      displayName: 'Publish Console App'

    # Tests
    - task: DotNetCoreCLI@2
      inputs:
        command: 'test'
        projects: '**/*[Tt]est*/*.csproj'
        arguments: '--collect:"XPlat Code Coverage" --logger:junit /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura'
        testRunTitle: 'dotnet test'
      displayName: 'Run Unit Tests'

    # CodeQL Analyse nur in develop
    - task: AdvancedSecurity-Codeql-Analyze@1
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      displayName: 'Perform CodeQL analysis'

    # Test Results
    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/TestResults/TestResults.xml'
        testRunTitle: 'Run Testresults'
      displayName: 'Publish Test Results'

    # Coverage
    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/**/coverage.cobertura.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)/**/coverage'
      displayName: 'Publish Code Coverage Results'

    # Coverage Report
    - task: reportgenerator@5
      inputs:
        reports: '$(Build.SourcesDirectory)/**/coverage.cobertura.xml'
        targetdir: '$(Build.SourcesDirectory)/CodeCoverage'
      displayName: 'Generate Code Coverage Report'

    # CodeQL Publish nur in develop
    - task: AdvancedSecurity-Publish@1
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      displayName: 'Publish CodeQL results'

    # Mirror to GitHub
    - task: Bash@3
      inputs:
        targetType: 'inline'
        script: |             
          if [ -d "$(AppName)" ]; then
              rm -rf "$(AppName)"
              echo "Das Verzeichnis '$(AppName)' wurde gelöscht."
          else
              echo "Das Verzeichnis '$(AppName)' existiert nicht."
          fi
          
          git clone --mirror https://saigkill:$(AzurePAT)@dev.azure.com/saigkill/$(AppName)/_git/$(AppName) ./$(AppName) --verbose
          cd $(AppName)
          git remote add github https://saigkill:$(GithubPAT)@github.com/saigkill/$(AppName).git
          git push github --mirror
      displayName: 'Mirror to Github'

    # ZIP nur bei Tags
    - task: ArchiveFiles@2      
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/$(AppName)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(ArtifactName)'
        replaceExistingArchive: true
      displayName: 'Create ZIP'

    # Artefakt veröffentlichen
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: $(RID)
      displayName: "Publish Artifact"

# ============================================================
# STAGE: PACKAGING (Linux only)
# ============================================================
- stage: Package
  displayName: "Package Stage"
  dependsOn: Build
  jobs:
  - job: PackageLinux
    displayName: "Build DEB + RPM"
    pool:
      vmImage: "ubuntu-latest"

    variables:
      version: $[coalesce(variables['Build.SourceVersion'], variables['Build.BuildId'])]

    steps:
    # Download Linux build artifacts
    - download: current
      artifact: linux-x64

    - script: |
        unzip linux-x64/ServiceMonitor-linux-x64.zip -d publish/linux-x64
      displayName: "Unzip Linux Build"

    # Install FPM
    - script: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev build-essential rpm
        sudo gem install --no-document fpm
      displayName: "Install FPM"

    # systemd unit
    - script: |
        mkdir -p systemd
        cat <<EOF > systemd/servicemonitor.service
[Unit]
Description=ServiceMonitor
After=network.target

[Service]
ExecStart=/usr/local/bin/ServiceMonitor
WorkingDirectory=/usr/local/bin
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF
      displayName: "Generate systemd unit"

    # DEB scripts
    - script: |
        mkdir -p deb-scripts
        cat <<EOF > deb-scripts/postinst
#!/bin/bash
set -e
systemctl daemon-reload
systemctl enable servicemonitor.service || true
systemctl restart servicemonitor.service || true
EOF
        chmod +x deb-scripts/postinst

        cat <<EOF > deb-scripts/postrm
#!/bin/bash
set -e
systemctl stop servicemonitor.service || true
systemctl disable servicemonitor.service || true
systemctl daemon-reload
EOF
        chmod +x deb-scripts/postrm
      displayName: "Generate DEB scripts"

    # RPM scripts
    - script: |
        mkdir -p rpm-scripts
        cat <<EOF > rpm-scripts/pre
#!/bin/bash
echo "Preparing to install ServiceMonitor"
EOF
        chmod +x rpm-scripts/pre

        cat <<EOF > rpm-scripts/post
#!/bin/bash
systemctl daemon-reload
systemctl enable servicemonitor.service || true
systemctl restart servicemonitor.service || true
EOF
        chmod +x rpm-scripts/post
      displayName: "Generate RPM scripts"

    # Build DEB
    - script: |
        fpm -s dir -t deb \
          -n servicemonitor \
          -v $(version) \
          --after-install deb-scripts/postinst \
          --after-remove deb-scripts/postrm \
          --prefix /usr/local/bin \
          publish/linux-x64/=usr/local/bin/ \
          systemd/servicemonitor.service=/lib/systemd/system/servicemonitor.service
      displayName: "Build DEB package"

    # Build RPM
    - script: |
        fpm -s dir -t rpm \
          -n servicemonitor \
          -v $(version) \
          --before-install rpm-scripts/pre \
          --after-install rpm-scripts/post \
          --prefix /usr/local/bin \
          publish/linux-x64/=usr/local/bin/ \
          systemd/servicemonitor.service=/usr/lib/systemd/system/servicemonitor.service
      displayName: "Build RPM package"

    # Publish artifacts
    - publish: "servicemonitor_$(version)_amd64.deb"
      artifact: deb

    - publish: "servicemonitor-$(version)-1.x86_64.rpm"
      artifact: rpm

# ---------------------------------------------------------
#  STAGE: RELEASE (nur bei Tags)
# ---------------------------------------------------------
- stage: Release
  displayName: "Create GitHub Release"
  condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/')
  jobs:
  - job: ReleaseJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - download: current
      artifact: linux-x64

    - download: current
      artifact: win-x64

    - download: current
      artifact: deb

    - download: current
      artifact: rpm

    - task: DownloadPipelineArtifact@2
      displayName: "Download QPKG"
      inputs:
        artifact: "qpkg"
        path: "$(Build.SourcesDirectory)/release"

    - task: GitHubRelease@1
      inputs:
        gitHubConnection: 'github.com_saigkill'
        repositoryName: 'saigkill/$(AppName)'
        action: 'create'
        tagSource: 'gitTag'
        assets: |
          $(Pipeline.Workspace)/linux-x64/*.zip
          $(Pipeline.Workspace)/win-x64/*.zip
          $(Pipeline.Workspace)/deb/*.deb
          $(Pipeline.Workspace)/rpm/*.rpm
        title: 'Release $(Build.SourceBranchName)'
        isDraft: false
        isPreRelease: false
      displayName: 'Create GitHub Release'
